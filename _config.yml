github_username: hYe807n
instagram_username: h_ye8o7n
wakatime_username: hYe807n
markdown: kramdown
highlighter: rouge
permalink: pretty
show_author_work_experiences: true
show_author_education_details: true
show_author_project_details: false
paginate_multiple:
  - paginate: '4'
    per_page: 4
    paginate_path: '/paperreview/page:num/'
    sub_dir: /paperreview
    New field 1: ''
  - paginate: 4
    per_page: 4
    paginate_path: '/codereview/page:num/'
    sub_dir: /codereview
gems:
  - jekyll-paginate
  - jekyll-paginate-multiple
collections:
  products:
    output: true
  authors:
    output: true
defaults:
  - scope:
      path: gallery
    values:
      permalink: '/:path/:basename:output_ext'
  - scope:
      path: ''
      type: authors
    values:
      layout: author
      permalink: '/paperreview/authors/:slug'
  - scope:
      path: assets/**
    values:
      sitemap: false
plugins:
  - jekyll-paginate
  - jekyll-paginate-multiple
  - jekyll-gist
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-admin
jekyll_admin:
  homepage: posts
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - assets/bower_components/isotope-layout/README.md
  - assets/bower_components/icono/README.md
  - >-
    assets/bower_components/font-awesome/advanced-options/use-with-node-js/fontawesome-svg-core/README.md
